services:
  - type: web
    name: brief
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --timeout 120 main:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: baidu/cobuddy:free
    disk:
      name: db
      mountPath: /opt/render/project/src/db
      sizeGB: 1
